AWSTemplateFormatVersion: "2010-09-09"
Description: Pathfinder web hosting - CloudFront distributions for admin and public status apps.

Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    AllowedPattern: "^[a-z0-9-]+$"
  AdminBucketName:
    Type: String
    Default: vornan-pathfinder
  StatusBucketName:
    Type: String
    Default: vornan-pathfinder-status
  AdminDomainName:
    Type: String
    Default: ""
    Description: Optional admin app alias, such as pathfinder.vornan.co.
  StatusDomainName:
    Type: String
    Default: ""
    Description: Optional public status alias, such as status.vornan.co.
  CertificateArn:
    Type: String
    Default: ""
    Description: Optional us-east-1 ACM certificate ARN for CloudFront aliases.

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, ""]]
  HasAdminAlias: !And
    - !Not [!Equals [!Ref AdminDomainName, ""]]
    - !Condition HasCertificate
  HasStatusAlias: !And
    - !Not [!Equals [!Ref StatusDomainName, ""]]
    - !Condition HasCertificate

Resources:
  AdminOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "pathfinder-admin-${EnvironmentName}-oac"
        Description: !Sub "CloudFront access control for ${AdminBucketName}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  StatusOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "pathfinder-status-${EnvironmentName}-oac"
        Description: !Sub "CloudFront access control for ${StatusBucketName}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AdminDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Pathfinder admin app (${EnvironmentName})"
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Aliases: !If
          - HasAdminAlias
          - [!Ref AdminDomainName]
          - !Ref AWS::NoValue
        Origins:
          - Id: admin-s3-origin
            DomainName: !Sub "${AdminBucketName}.s3.${AWS::Region}.amazonaws.com"
            OriginAccessControlId: !GetAtt AdminOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: admin-s3-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate: !If
          - HasAdminAlias
          - AcmCertificateArn: !Ref CertificateArn
            MinimumProtocolVersion: TLSv1.2_2021
            SslSupportMethod: sni-only
          - CloudFrontDefaultCertificate: true

  StatusDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Pathfinder public order status app (${EnvironmentName})"
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Aliases: !If
          - HasStatusAlias
          - [!Ref StatusDomainName]
          - !Ref AWS::NoValue
        Origins:
          - Id: status-s3-origin
            DomainName: !Sub "${StatusBucketName}.s3.${AWS::Region}.amazonaws.com"
            OriginAccessControlId: !GetAtt StatusOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: status-s3-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate: !If
          - HasStatusAlias
          - AcmCertificateArn: !Ref CertificateArn
            MinimumProtocolVersion: TLSv1.2_2021
            SslSupportMethod: sni-only
          - CloudFrontDefaultCertificate: true

  AdminBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AdminBucketName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${AdminBucketName}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AdminDistribution}"

  StatusBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StatusBucketName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${StatusBucketName}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${StatusDistribution}"

Outputs:
  AdminDistributionId:
    Description: CloudFront distribution ID for the Pathfinder admin app.
    Value: !Ref AdminDistribution
  AdminDistributionDomainName:
    Description: CloudFront domain name for the Pathfinder admin app.
    Value: !GetAtt AdminDistribution.DomainName
  StatusDistributionId:
    Description: CloudFront distribution ID for the public order status app.
    Value: !Ref StatusDistribution
  StatusDistributionDomainName:
    Description: CloudFront domain name for the public order status app.
    Value: !GetAtt StatusDistribution.DomainName
