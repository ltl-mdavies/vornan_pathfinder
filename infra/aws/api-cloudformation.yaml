AWSTemplateFormatVersion: "2010-09-09"
Description: Pathfinder production API shell - HTTP API Gateway plus Lambda.

Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    AllowedPattern: "^[a-z0-9-]+$"
  ApiName:
    Type: String
    Default: vornan-pathfinder-api
  LambdaFunctionName:
    Type: String
    Default: vornan-pathfinder-api
  LambdaCodeS3Bucket:
    Type: String
  LambdaCodeS3Key:
    Type: String
  AllowedOrigins:
    Type: String
    Default: "https://pathfinder.vornan.co,https://status.vornan.co"
  PublicStatusBaseUrl:
    Type: String
    Default: "https://status.vornan.co"
  PublicStatusTokenDays:
    Type: Number
    Default: 30
  PublicStatusReturnLink:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  PublicStatusEmailMode:
    Type: String
    Default: "log"
    AllowedValues:
      - log
      - ses
  PublicStatusEmailDebugReturnLink:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  PublicIntakeEmailVerificationEnabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Fail-closed server gate for one-time customer order dropbox email verification.
  EmailFrom:
    Type: String
    Default: "Vornan Updates <notifications@notify.vornan.co>"
  StatusReplyTo:
    Type: String
    Default: "support@vornan.co"
  ProofReplyTo:
    Type: String
    Default: "support@vornan.com"
  OrdersReplyTo:
    Type: String
    Default: "orders@vornan.co"
  SystemReplyTo:
    Type: String
    Default: "ops@vornan.co"
  SesRegion:
    Type: String
    Default: "us-east-1"
  SesConfigurationSet:
    Type: String
    Default: "pathfinder-transactional"
  PublicStatusRateLimitPepper:
    Type: String
    Default: ""
    NoEcho: true
  PublicStatusEmailMatchRequired:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  PublicStatusGlobalAllowedDomains:
    Type: String
    Default: "ltlco.com,vornan.co"
    Description: Comma-separated trusted domains allowed to request public status links across customers.
  RequireFirebaseAuth:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  AllowedEmailDomains:
    Type: String
    Default: "ltlco.com,vornan.co"
  FirebaseProjectId:
    Type: String
    Default: "ltl-dashboard-site"
  LiftCustomerListUrl:
    Type: String
    Default: "https://admin.lifterp.com/ords/lifterp/lift/erp/flush/ondemand/91/CustomerContactLIst/LTL-Customer-List?offset=0"
  LiftCustomerStatusUrl:
    Type: String
    Default: "https://ltlco.lifterp.com/ords/lifterp/lift/erp/flush/ondemand/91/CustomerStatusJSON/CustomerStatusJSON?"
  LiftProductCatalogBaseUrl:
    Type: String
    Default: "https://ltlco.lifterp.com/ords/api/lift/erp"
  ExternalLiftSubmitEnabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Server-level gate for certified Lift submit requests.
  LiftTransportMode:
    Type: String
    Default: dry_run
    AllowedValues:
      - dry_run
      - mock
      - live
    Description: Lift submit transport. Live performs the external POST after every other gate passes.
  AllowLiveCustomerSubmit:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Keep false for sandbox-profile submits through the production Lift endpoint.
  ApiDomainName:
    Type: String
    Default: ""
    Description: Optional custom API domain, such as api.pathfinder.vornan.co.
  ApiCertificateArn:
    Type: String
    Default: ""
    Description: Optional ACM certificate ARN for ApiDomainName. Must be in the same region as this API Gateway HTTP API.
  DataTablePrefix:
    Type: String
    Default: Pathfinder
    AllowedPattern: "^[A-Za-z0-9-]+$"
    Description: Prefix used for Pathfinder DynamoDB table names.
  SecretPrefix:
    Type: String
    Default: "/vornan/pathfinder/"
    Description: Secrets Manager prefix Pathfinder may read and write.
  StorageDriver:
    Type: String
    Default: dynamodb
    AllowedValues:
      - local
      - dynamodb
    Description: Runtime storage driver for Pathfinder application data.
  SecretsDriver:
    Type: String
    Default: local
    AllowedValues:
      - local
      - secrets-manager
    Description: Runtime secrets driver. Keep local until the Secrets Manager adapter is enabled.
  ProofCoreTableName:
    Type: String
    Default: ""
    Description: Optional dedicated Proof core table name from the Vornan Proof stack.
  ProofCoreTableArn:
    Type: String
    Default: ""
  ProofAuditTableName:
    Type: String
    Default: ""
    Description: Optional dedicated Proof audit table name from the Vornan Proof stack.
  ProofAuditTableArn:
    Type: String
    Default: ""
  ProofGrantCreationEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  ProofGrantAllowedCustomerIds:
    Type: String
    Default: ""
    AllowedPattern: "^$|^[0-9]{1,20}(,[0-9]{1,20}){0,19}$"
    Description: Comma-separated Lift customer IDs eligible for authenticated view-only grant creation.
  ProofReadOnlyActivationExpiresAt:
    Type: String
    Default: ""
    AllowedPattern: "^$|^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\\.[0-9]{3})?Z$"
    Description: UTC deadline after which grant creation, token exchange, and sessions fail closed.
  ProofLinkEmailEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  ProofPublicBaseUrl:
    Type: String
    Default: "https://proof.vornan.co"
    Description: Public origin used only when producing a one-time Proof fragment link.

Rules:
  ProofGrantCreationRequiresBoundedCohort:
    RuleCondition: !Equals [!Ref ProofGrantCreationEnabled, "true"]
    Assertions:
      - Assert: !Not [!Equals [!Ref ProofGrantAllowedCustomerIds, ""]]
        AssertDescription: ProofGrantAllowedCustomerIds must be configured before grant creation can be enabled.
      - Assert: !Not [!Equals [!Ref ProofReadOnlyActivationExpiresAt, ""]]
        AssertDescription: ProofReadOnlyActivationExpiresAt must be configured before grant creation can be enabled.
  ProofLinkEmailRequiresGrantCreation:
    Assertions:
      - Assert: !Or
          - !Equals [!Ref ProofLinkEmailEnabled, "false"]
          - !Equals [!Ref ProofGrantCreationEnabled, "true"]
        AssertDescription: Proof link email requires authenticated Proof grant creation to be enabled.
  ProofTablesMustBeConfiguredTogether:
    Assertions:
      - Assert: !Or
          - !And
            - !Equals [!Ref ProofCoreTableName, ""]
            - !Equals [!Ref ProofAuditTableName, ""]
          - !And
            - !Not [!Equals [!Ref ProofCoreTableName, ""]]
            - !Not [!Equals [!Ref ProofAuditTableName, ""]]
        AssertDescription: ProofCoreTableName and ProofAuditTableName must be configured together.
      - Assert: !Or
          - !And
            - !Equals [!Ref ProofCoreTableArn, ""]
            - !Equals [!Ref ProofAuditTableArn, ""]
          - !And
            - !Not [!Equals [!Ref ProofCoreTableArn, ""]]
            - !Not [!Equals [!Ref ProofAuditTableArn, ""]]
        AssertDescription: ProofCoreTableArn and ProofAuditTableArn must be configured together.
      - Assert: !Or
          - !And
            - !Equals [!Ref ProofCoreTableName, ""]
            - !Equals [!Ref ProofCoreTableArn, ""]
          - !And
            - !Not [!Equals [!Ref ProofCoreTableName, ""]]
            - !Not [!Equals [!Ref ProofCoreTableArn, ""]]
        AssertDescription: Proof core table name and ARN must either both be present or both be absent.

Conditions:
  HasApiCustomDomain: !And
    - !Not [!Equals [!Ref ApiDomainName, ""]]
    - !Not [!Equals [!Ref ApiCertificateArn, ""]]
  HasProofCoreTable: !And
    - !Not [!Equals [!Ref ProofCoreTableName, ""]]
    - !Not [!Equals [!Ref ProofCoreTableArn, ""]]
  HasProofAuditTable: !And
    - !Not [!Equals [!Ref ProofAuditTableName, ""]]
    - !Not [!Equals [!Ref ProofAuditTableArn, ""]]

Resources:
  PathfinderApiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${LambdaFunctionName}-${EnvironmentName}-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub "${LambdaFunctionName}-${EnvironmentName}-data-access"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:ConditionCheckItem
                  - dynamodb:DeleteItem
                  - dynamodb:DescribeTable
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt PathfinderCustomersTable.Arn
                  - !GetAtt PathfinderCustomerWorkspacesTable.Arn
                  - !GetAtt PathfinderTargetsTable.Arn
                  - !GetAtt PathfinderImportMethodsTable.Arn
                  - !GetAtt PathfinderOutputRoutesTable.Arn
                  - !GetAtt PathfinderProductMappingsTable.Arn
                  - !GetAtt PathfinderJobsTable.Arn
                  - !GetAtt PathfinderOrderIdsTable.Arn
                  - !GetAtt PathfinderSubmitAttemptsTable.Arn
                  - !GetAtt PathfinderLiftProductCacheTable.Arn
                  - !GetAtt PathfinderOrderStatusTokensTable.Arn
                  - !GetAtt PathfinderOrderStatusSnapshotsTable.Arn
                  - !GetAtt PathfinderCanonicalRegistryTable.Arn
                  - !If [HasProofCoreTable, !Ref ProofCoreTableArn, !Ref "AWS::NoValue"]
                  - !If [HasProofCoreTable, !Sub "${ProofCoreTableArn}/index/*", !Ref "AWS::NoValue"]
              - !If
                - HasProofAuditTable
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                    - dynamodb:PutItem
                    - dynamodb:Query
                  Resource: !Ref ProofAuditTableArn
                - !Ref "AWS::NoValue"
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:UpdateSecret
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretPrefix}*"
              - Effect: Allow
                Action:
                  - ses:SendEmail
                Resource:
                  - !Sub "arn:aws:ses:${SesRegion}:${AWS::AccountId}:identity/notify.vornan.co"
                  - !Sub "arn:aws:ses:${SesRegion}:${AWS::AccountId}:configuration-set/${SesConfigurationSet}"

  PathfinderApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${LambdaFunctionName}-${EnvironmentName}"
      Description: Pathfinder API Express shell behind API Gateway HTTP API.
      Runtime: nodejs22.x
      Handler: lambda.handler
      Role: !GetAtt PathfinderApiRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      MemorySize: 1024
      Timeout: 30
      Environment:
        Variables:
          NODE_OPTIONS: "--enable-source-maps"
          PATHFINDER_RUNTIME: "lambda"
          PATHFINDER_CUSTOMER_SEED_FILE: "/var/task/data/lift-customers.sample.csv"
          PATHFINDER_ALLOWED_ORIGINS: !Ref AllowedOrigins
          PATHFINDER_PUBLIC_STATUS_BASE_URL: !Ref PublicStatusBaseUrl
          PATHFINDER_PUBLIC_STATUS_TOKEN_DAYS: !Ref PublicStatusTokenDays
          PATHFINDER_PUBLIC_STATUS_RETURN_LINK: !Ref PublicStatusReturnLink
          PATHFINDER_STATUS_EMAIL_MODE: !Ref PublicStatusEmailMode
          PATHFINDER_STATUS_EMAIL_DEBUG_RETURN_LINK: !Ref PublicStatusEmailDebugReturnLink
          PATHFINDER_PUBLIC_INTAKE_EMAIL_VERIFICATION_ENABLED: !Ref PublicIntakeEmailVerificationEnabled
          PATHFINDER_EMAIL_FROM: !Ref EmailFrom
          PATHFINDER_STATUS_REPLY_TO: !Ref StatusReplyTo
          PATHFINDER_PROOF_REPLY_TO: !Ref ProofReplyTo
          PATHFINDER_ORDERS_REPLY_TO: !Ref OrdersReplyTo
          PATHFINDER_SYSTEM_REPLY_TO: !Ref SystemReplyTo
          PATHFINDER_SES_REGION: !Ref SesRegion
          PATHFINDER_SES_CONFIGURATION_SET: !Ref SesConfigurationSet
          PATHFINDER_PUBLIC_STATUS_RATE_LIMIT_PEPPER: !Ref PublicStatusRateLimitPepper
          PATHFINDER_PUBLIC_STATUS_EMAIL_MATCH_REQUIRED: !Ref PublicStatusEmailMatchRequired
          PATHFINDER_PUBLIC_STATUS_GLOBAL_ALLOWED_DOMAINS: !Ref PublicStatusGlobalAllowedDomains
          PATHFINDER_REQUIRE_AUTH: !Ref RequireFirebaseAuth
          PATHFINDER_ALLOWED_EMAIL_DOMAINS: !Ref AllowedEmailDomains
          FIREBASE_PROJECT_ID: !Ref FirebaseProjectId
          LIFT_CUSTOMER_LIST_URL: !Ref LiftCustomerListUrl
          LIFT_CUSTOMER_STATUS_URL: !Ref LiftCustomerStatusUrl
          LIFT_PRODUCT_CATALOG_BASE_URL: !Ref LiftProductCatalogBaseUrl
          PATHFINDER_ENABLE_LIFT_SUBMIT: !Ref ExternalLiftSubmitEnabled
          PATHFINDER_LIFT_TRANSPORT_MODE: !Ref LiftTransportMode
          PATHFINDER_ALLOW_LIVE_CUSTOMER_SUBMIT: !Ref AllowLiveCustomerSubmit
          PATHFINDER_STORAGE_DRIVER: !Ref StorageDriver
          PATHFINDER_SECRETS_DRIVER: !Ref SecretsDriver
          PATHFINDER_SECRET_PREFIX: !Ref SecretPrefix
          PATHFINDER_CUSTOMERS_TABLE: !Ref PathfinderCustomersTable
          PATHFINDER_CUSTOMER_WORKSPACES_TABLE: !Ref PathfinderCustomerWorkspacesTable
          PATHFINDER_TARGETS_TABLE: !Ref PathfinderTargetsTable
          PATHFINDER_IMPORT_METHODS_TABLE: !Ref PathfinderImportMethodsTable
          PATHFINDER_OUTPUT_ROUTES_TABLE: !Ref PathfinderOutputRoutesTable
          PATHFINDER_PRODUCT_MAPPINGS_TABLE: !Ref PathfinderProductMappingsTable
          PATHFINDER_JOBS_TABLE: !Ref PathfinderJobsTable
          PATHFINDER_ORDER_IDS_TABLE: !Ref PathfinderOrderIdsTable
          PATHFINDER_SUBMIT_ATTEMPTS_TABLE: !Ref PathfinderSubmitAttemptsTable
          PATHFINDER_LIFT_PRODUCT_CACHE_TABLE: !Ref PathfinderLiftProductCacheTable
          PATHFINDER_ORDER_STATUS_TOKENS_TABLE: !Ref PathfinderOrderStatusTokensTable
          PATHFINDER_ORDER_STATUS_SNAPSHOTS_TABLE: !Ref PathfinderOrderStatusSnapshotsTable
          PATHFINDER_CANONICAL_REGISTRY_TABLE: !Ref PathfinderCanonicalRegistryTable
          PATHFINDER_PROOF_STORAGE_DRIVER: !If [HasProofCoreTable, "dynamodb", "disabled"]
          PATHFINDER_PROOF_CORE_TABLE: !If [HasProofCoreTable, !Ref ProofCoreTableName, !Ref "AWS::NoValue"]
          PATHFINDER_PROOF_AUDIT_TABLE: !If [HasProofAuditTable, !Ref ProofAuditTableName, !Ref "AWS::NoValue"]
          PATHFINDER_PROOF_ENABLE_GRANT_CREATION: !Ref ProofGrantCreationEnabled
          PATHFINDER_PROOF_GRANT_ALLOWED_CUSTOMER_IDS: !Ref ProofGrantAllowedCustomerIds
          PATHFINDER_PROOF_READ_ONLY_ACTIVATION_EXPIRES_AT: !Ref ProofReadOnlyActivationExpiresAt
          PATHFINDER_PROOF_ENABLE_LINK_EMAIL: !Ref ProofLinkEmailEnabled
          PATHFINDER_PROOF_ENABLE_PUBLIC_READ: "false"
          PATHFINDER_PROOF_PUBLIC_BASE_URL: !Ref ProofPublicBaseUrl

  PathfinderCustomersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${DataTablePrefix}-Customers-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customer_id
          AttributeType: S
      KeySchema:
        - AttributeName: customer_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: App
          Value: Pathfinder
        - Key: Environment
          Value: !Ref EnvironmentName

  PathfinderCustomerWorkspacesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${DataTablePrefix}-CustomerWorkspaces-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customer_id
          AttributeType: S
      KeySchema:
        - AttributeName: customer_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: App
          Value: Pathfinder
        - Key: Environment
          Value: !Ref EnvironmentName

  PathfinderTargetsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${DataTablePrefix}-Targets-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: target_id
          AttributeType: S
      KeySchema:
        - AttributeName: target_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: App
          Value: Pathfinder
        - Key: Environment
          Value: !Ref EnvironmentName

  PathfinderImportMethodsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${DataTablePrefix}-ImportMethods-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customer_id
          AttributeType: S
        - AttributeName: import_method_id
          AttributeType: S
      KeySchema:
        - AttributeName: customer_id
          KeyType: HASH
        - AttributeName: import_method_id
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: App
          Value: Pathfinder
        - Key: Environment
          Value: !Ref EnvironmentName

  PathfinderOutputRoutesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${DataTablePrefix}-OutputRoutes-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customer_id
          AttributeType: S
        - AttributeName: output_route_id
          AttributeType: S
      KeySchema:
        - AttributeName: customer_id
          KeyType: HASH
        - AttributeName: output_route_id
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: App
          Value: Pathfinder
        - Key: Environment
          Value: !Ref EnvironmentName

  PathfinderProductMappingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${DataTablePrefix}-ProductMappings-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customer_route_id
          AttributeType: S
        - AttributeName: mapping_id
          AttributeType: S
      KeySchema:
        - AttributeName: customer_route_id
          KeyType: HASH
        - AttributeName: mapping_id
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: App
          Value: Pathfinder
        - Key: Environment
          Value: !Ref EnvironmentName

  PathfinderJobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${DataTablePrefix}-Jobs-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customer_id
          AttributeType: S
        - AttributeName: job_id
          AttributeType: S
      KeySchema:
        - AttributeName: customer_id
          KeyType: HASH
        - AttributeName: job_id
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: App
          Value: Pathfinder
        - Key: Environment
          Value: !Ref EnvironmentName

  PathfinderOrderIdsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${DataTablePrefix}-OrderIds-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pathfinder_order_id
          AttributeType: S
      KeySchema:
        - AttributeName: pathfinder_order_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: App
          Value: Pathfinder
        - Key: Environment
          Value: !Ref EnvironmentName

  PathfinderSubmitAttemptsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${DataTablePrefix}-SubmitAttempts-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customer_id
          AttributeType: S
        - AttributeName: attempt_id
          AttributeType: S
      KeySchema:
        - AttributeName: customer_id
          KeyType: HASH
        - AttributeName: attempt_id
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: App
          Value: Pathfinder
        - Key: Environment
          Value: !Ref EnvironmentName

  PathfinderLiftProductCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${DataTablePrefix}-LiftProductCache-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: route_environment_id
          AttributeType: S
        - AttributeName: product_id
          AttributeType: S
      KeySchema:
        - AttributeName: route_environment_id
          KeyType: HASH
        - AttributeName: product_id
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: App
          Value: Pathfinder
        - Key: Environment
          Value: !Ref EnvironmentName

  PathfinderOrderStatusTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${DataTablePrefix}-OrderStatusTokens-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token_hash
          AttributeType: S
      KeySchema:
        - AttributeName: token_hash
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at_epoch
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: App
          Value: Pathfinder
        - Key: Environment
          Value: !Ref EnvironmentName

  PathfinderOrderStatusSnapshotsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${DataTablePrefix}-OrderStatusSnapshots-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: order_key
          AttributeType: S
      KeySchema:
        - AttributeName: order_key
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: App
          Value: Pathfinder
        - Key: Environment
          Value: !Ref EnvironmentName

  PathfinderCanonicalRegistryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${DataTablePrefix}-CanonicalRegistry-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: registry_id
          AttributeType: S
      KeySchema:
        - AttributeName: registry_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: App
          Value: Pathfinder
        - Key: Environment
          Value: !Ref EnvironmentName

  PathfinderHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${ApiName}-${EnvironmentName}"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowCredentials: false
        AllowHeaders:
          - authorization
          - content-type
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowOrigins: !Split [",", !Ref AllowedOrigins]
        MaxAge: 300

  PathfinderApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PathfinderHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations"
        - FunctionArn: !GetAtt PathfinderApiFunction.Arn
      PayloadFormatVersion: "2.0"

  PathfinderApiProxyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PathfinderHttpApi
      RouteKey: "ANY /{proxy+}"
      Target: !Sub "integrations/${PathfinderApiIntegration}"

  PathfinderApiRootRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PathfinderHttpApi
      RouteKey: "ANY /"
      Target: !Sub "integrations/${PathfinderApiIntegration}"

  PathfinderApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref PathfinderHttpApi
      StageName: "$default"
      AutoDeploy: true

  PathfinderApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PathfinderApiFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PathfinderHttpApi}/*/*"

  PathfinderApiCustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasApiCustomDomain
    Properties:
      DomainName: !Ref ApiDomainName
      DomainNameConfigurations:
        - CertificateArn: !Ref ApiCertificateArn
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  PathfinderApiCustomDomainMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasApiCustomDomain
    Properties:
      ApiId: !Ref PathfinderHttpApi
      DomainName: !Ref PathfinderApiCustomDomain
      Stage: !Ref PathfinderApiStage

Outputs:
  ApiEndpoint:
    Description: HTTP API endpoint.
    Value: !GetAtt PathfinderHttpApi.ApiEndpoint
  LambdaFunctionName:
    Description: Lambda function name.
    Value: !Ref PathfinderApiFunction
  HealthUrl:
    Description: API health endpoint.
    Value: !Sub "${PathfinderHttpApi.ApiEndpoint}/health"
  CustomDomainName:
    Condition: HasApiCustomDomain
    Description: Custom API domain.
    Value: !Ref ApiDomainName
  CustomDomainHealthUrl:
    Condition: HasApiCustomDomain
    Description: Custom API health endpoint.
    Value: !Sub "https://${ApiDomainName}/health"
  CustomDomainRegionalTarget:
    Condition: HasApiCustomDomain
    Description: API Gateway regional domain target for GoDaddy CNAME.
    Value: !GetAtt PathfinderApiCustomDomain.RegionalDomainName
  CustomDomainRegionalHostedZoneId:
    Condition: HasApiCustomDomain
    Description: API Gateway regional hosted zone id.
    Value: !GetAtt PathfinderApiCustomDomain.RegionalHostedZoneId
  DataTableNames:
    Description: Comma-separated DynamoDB tables created for Pathfinder.
    Value: !Join
      - ","
      - - !Ref PathfinderCustomersTable
        - !Ref PathfinderCustomerWorkspacesTable
        - !Ref PathfinderTargetsTable
        - !Ref PathfinderImportMethodsTable
        - !Ref PathfinderOutputRoutesTable
        - !Ref PathfinderProductMappingsTable
        - !Ref PathfinderJobsTable
        - !Ref PathfinderOrderIdsTable
        - !Ref PathfinderSubmitAttemptsTable
        - !Ref PathfinderLiftProductCacheTable
        - !Ref PathfinderOrderStatusTokensTable
        - !Ref PathfinderOrderStatusSnapshotsTable
        - !Ref PathfinderCanonicalRegistryTable
  ConfiguredSecretPrefix:
    Description: Secrets Manager prefix granted to the Pathfinder API Lambda role.
    Value: !Ref SecretPrefix
