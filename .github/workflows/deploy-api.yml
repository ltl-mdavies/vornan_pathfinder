name: Deploy Pathfinder API

on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: "Deployment environment name"
        required: true
        default: "prod"
      allowed_origins:
        description: "Comma-separated CORS origins"
        required: true
        default: "https://pathfinder.vornan.co,https://status.vornan.co"
      public_status_base_url:
        description: "Public order status app base URL"
        required: true
        default: "https://status.vornan.co"
      require_auth:
        description: "Require Firebase auth on /api routes"
        required: true
        default: "true"
      api_domain_name:
        description: "Optional API custom domain"
        required: true
        default: "api.pathfinder.vornan.co"
      enable_lift_submit:
        description: "Enable certified Lift submits at the API boundary"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      lift_transport_mode:
        description: "Lift submit transport mode"
        required: true
        type: choice
        options:
          - live
          - dry_run
          - mock
        default: live
      allow_live_customer_submit:
        description: "Allow live-customer submit profiles (keep false for the LTL Demo sandbox lane)"
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Require merged main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Production API deploys must run from the merged main branch. Selected ref: ${GITHUB_REF}"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Test
        run: |
          npm run test
          npm run test:proof-deploy

      - name: Package API Lambda
        run: npm run package:api-lambda

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Upload Lambda artifact
        id: artifact
        run: |
          key="api/pathfinder-api-lambda-${GITHUB_SHA}.zip"
          aws s3 cp outputs/pathfinder-api-lambda.zip "s3://${{ vars.PATHFINDER_API_ARTIFACT_BUCKET }}/${key}"
          echo "key=${key}" >> "${GITHUB_OUTPUT}"

      - name: Deploy API stack
        run: |
          aws cloudformation deploy \
            --stack-name "${{ vars.PATHFINDER_API_STACK_NAME || 'vornan-pathfinder-api-prod' }}" \
            --template-file infra/aws/api-cloudformation.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              EnvironmentName="${{ inputs.environment_name }}" \
              ApiName="${{ vars.PATHFINDER_API_NAME || 'vornan-pathfinder-api' }}" \
              LambdaFunctionName="${{ vars.PATHFINDER_API_LAMBDA_NAME || 'vornan-pathfinder-api' }}" \
              LambdaCodeS3Bucket="${{ vars.PATHFINDER_API_ARTIFACT_BUCKET }}" \
              LambdaCodeS3Key="${{ steps.artifact.outputs.key }}" \
              AllowedOrigins="${{ inputs.allowed_origins }}" \
              PublicStatusBaseUrl="${{ inputs.public_status_base_url }}" \
              PublicStatusTokenDays="${{ vars.PATHFINDER_PUBLIC_STATUS_TOKEN_DAYS || '30' }}" \
              PublicStatusReturnLink="${{ vars.PATHFINDER_PUBLIC_STATUS_RETURN_LINK || 'false' }}" \
              PublicStatusEmailMode="${{ vars.PATHFINDER_STATUS_EMAIL_MODE || 'log' }}" \
              PublicStatusEmailDebugReturnLink="${{ vars.PATHFINDER_STATUS_EMAIL_DEBUG_RETURN_LINK || 'false' }}" \
              EmailFrom="${{ vars.PATHFINDER_EMAIL_FROM || 'Vornan Updates <notifications@notify.vornan.co>' }}" \
              StatusReplyTo="${{ vars.PATHFINDER_STATUS_REPLY_TO || 'support@vornan.co' }}" \
              ProofReplyTo="${{ vars.PATHFINDER_PROOF_REPLY_TO || 'support@vornan.com' }}" \
              OrdersReplyTo="${{ vars.PATHFINDER_ORDERS_REPLY_TO || 'orders@vornan.co' }}" \
              SystemReplyTo="${{ vars.PATHFINDER_SYSTEM_REPLY_TO || 'ops@vornan.co' }}" \
              SesRegion="${{ vars.PATHFINDER_SES_REGION || 'us-east-1' }}" \
              SesConfigurationSet="${{ vars.PATHFINDER_SES_CONFIGURATION_SET || 'pathfinder-transactional' }}" \
              PublicStatusRateLimitPepper="${{ secrets.PATHFINDER_PUBLIC_STATUS_RATE_LIMIT_PEPPER || '' }}" \
              PublicStatusEmailMatchRequired="${{ vars.PATHFINDER_PUBLIC_STATUS_EMAIL_MATCH_REQUIRED || 'true' }}" \
              PublicStatusGlobalAllowedDomains="${{ vars.PATHFINDER_PUBLIC_STATUS_GLOBAL_ALLOWED_DOMAINS || 'ltlco.com,vornan.co' }}" \
              RequireFirebaseAuth="${{ inputs.require_auth }}" \
              AllowedEmailDomains="${{ vars.PATHFINDER_ALLOWED_EMAIL_DOMAINS || 'ltlco.com,vornan.co' }}" \
              FirebaseProjectId="${{ secrets.FIREBASE_PROJECT_ID || secrets.VITE_FIREBASE_PROJECT_ID || 'ltl-dashboard-site' }}" \
              LiftCustomerListUrl="${{ vars.LIFT_CUSTOMER_LIST_URL }}" \
              LiftCustomerStatusUrl="${{ vars.LIFT_CUSTOMER_STATUS_URL }}" \
              LiftProductCatalogBaseUrl="${{ vars.LIFT_PRODUCT_CATALOG_BASE_URL || 'https://ltlco.lifterp.com/ords/api/lift/erp' }}" \
              ExternalLiftSubmitEnabled="${{ inputs.enable_lift_submit }}" \
              LiftTransportMode="${{ inputs.lift_transport_mode }}" \
              AllowLiveCustomerSubmit="${{ inputs.allow_live_customer_submit }}" \
              ApiDomainName="${{ inputs.api_domain_name }}" \
              ApiCertificateArn="${{ secrets.PATHFINDER_API_CERTIFICATE_ARN }}" \
              DataTablePrefix="${{ vars.PATHFINDER_DATA_TABLE_PREFIX || 'Pathfinder' }}" \
              SecretPrefix="${{ vars.PATHFINDER_SECRET_PREFIX || '/vornan/pathfinder/' }}" \
              StorageDriver="${{ vars.PATHFINDER_STORAGE_DRIVER || 'dynamodb' }}" \
              SecretsDriver="${{ vars.PATHFINDER_SECRETS_DRIVER || 'secrets-manager' }}" \
              ProofCoreTableName="${{ vars.PATHFINDER_PROOF_CORE_TABLE || '' }}" \
              ProofCoreTableArn="${{ vars.PATHFINDER_PROOF_CORE_TABLE_ARN || '' }}" \
              ProofAuditTableName="${{ vars.PATHFINDER_PROOF_AUDIT_TABLE || '' }}" \
              ProofAuditTableArn="${{ vars.PATHFINDER_PROOF_AUDIT_TABLE_ARN || '' }}" \
              ProofGrantCreationEnabled="${{ vars.PATHFINDER_PROOF_ENABLE_GRANT_CREATION || 'false' }}" \
              ProofGrantAllowedCustomerIds="${{ vars.PATHFINDER_PROOF_GRANT_ALLOWED_CUSTOMER_IDS || '' }}" \
              ProofReadOnlyActivationExpiresAt="${{ vars.PATHFINDER_PROOF_READ_ONLY_ACTIVATION_EXPIRES_AT || '' }}" \
              ProofLinkEmailEnabled="${{ vars.PATHFINDER_PROOF_ENABLE_LINK_EMAIL || 'false' }}" \
              ProofPublicBaseUrl="${{ vars.PATHFINDER_PROOF_PUBLIC_BASE_URL || 'https://proof.vornan.co' }}"

      - name: Show stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${{ vars.PATHFINDER_API_STACK_NAME || 'vornan-pathfinder-api-prod' }}" \
            --query "Stacks[0].Outputs" \
            --output table
