name: Validate Pathfinder

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck all workspaces
        run: npm run check

      - name: Test all workspaces
        run: npm run test

      - name: Build all workspaces
        run: npm run build

      - name: Install browser regression runtime
        run: npx playwright install --with-deps chromium

      - name: Test Proof browser regressions
        run: npm run test:browser

      - name: Verify Proof deployment contracts
        run: npm run test:proof-deploy

      - name: Evaluate Proof Phase 2 readiness
        run: npm run check:proof-phase2

      - name: Evaluate Proof read-only activation review
        run: npm run check:proof-activation-review

      - name: Package deployable Lambdas
        run: |
          npm run package:api-lambda
          npm run package:proof-lambdas

      - name: Parse deployment scripts
        run: |
          bash -n scripts/deploy-api-lambda.sh
          bash -n scripts/deploy-admin-web.sh
          bash -n scripts/deploy-web-hosting.sh
          bash -n scripts/deploy-proof-stack.sh
          bash -n scripts/deploy-proof-web.sh
