name: Deploy Pathfinder Admin Web

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "API base URL used by the Vite build"
        required: true
        default: "https://api.pathfinder.vornan.co"

jobs:
  deploy-admin-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Build admin web
        env:
          VITE_API_BASE_URL: ${{ inputs.api_base_url }}
        run: npm run build --workspace @pathfinder/web

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Sync immutable assets
        run: |
          aws s3 sync apps/web/dist "s3://${{ vars.PATHFINDER_ADMIN_BUCKET || 'vornan-pathfinder' }}" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload SPA entrypoint
        run: |
          aws s3 cp apps/web/dist/index.html "s3://${{ vars.PATHFINDER_ADMIN_BUCKET || 'vornan-pathfinder' }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        if: ${{ vars.PATHFINDER_ADMIN_CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.PATHFINDER_ADMIN_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
